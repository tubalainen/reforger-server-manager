name: Build and publish

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Lint backend (ruff)
        run: python -m ruff check backend/

      # The version lives in two files that no build stage can see at once, so it
      # cannot have a single source — but it can refuse to drift (#86).
      - name: Check backend and frontend versions agree
        run: |
          python - <<'EOF'
          import json, re, sys, pathlib
          backend = re.search(r'APP_VERSION = "([^"]+)"',
                              pathlib.Path("backend/config.py").read_text()).group(1)
          frontend = json.loads(pathlib.Path("frontend/package.json").read_text())["version"]
          if backend != frontend:
              sys.exit(f"version drift: backend/config.py={backend} frontend/package.json={frontend}")
          print(f"version {backend} — consistent")
          EOF

      - name: Run backend tests
        run: python -m pytest backend/tests -q

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend (eslint)
        working-directory: frontend
        run: npm run lint

      - name: Run frontend tests (vitest)
        working-directory: frontend
        run: npm test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  publish:
    needs: test
    # Publish on pushes to main and on version tags, never for PRs
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
