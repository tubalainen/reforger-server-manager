name: Release

# Cut a GitHub release from the version already on main. Runs automatically when
# a commit lands on main (e.g. a merged version bump) and can also be dispatched
# by hand from the Actions tab.
#
# It exists because a version tag can't always be pushed from every environment
# (e.g. Claude Code on the web pushes only its working branch, and can't dispatch
# workflows either); reacting to a push here, on GitHub with the built-in token,
# sidesteps both limits.
#
# On each run it:
#   * reads APP_VERSION from backend/config.py — the single source of truth the
#     CI drift check already enforces — and derives the vX.Y.Z tag;
#   * does nothing if that release already exists (so ordinary pushes are no-ops);
#   * otherwise creates the tag on the triggering commit plus a GitHub Release,
#     taking notes from docs/release-notes/<tag>.md when that file exists, or the
#     dispatch `notes` input, or GitHub's auto-generated notes;
#   * publishes the semver-pinned Docker images (:X.Y.Z and :X.Y). The :latest
#     image is pushed separately by build-and-publish.yml on every push to main.
on:
  workflow_dispatch:
    inputs:
      title:
        description: "Release title (defaults to the vX.Y.Z tag)"
        required: false
        type: string
      notes:
        description: "Release notes in Markdown. Leave blank to use the notes file or auto-generate."
        required: false
        type: string
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
      major_minor: ${{ steps.ver.outputs.major_minor }}
      create: ${{ steps.gate.outputs.create }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version from backend/config.py
        id: ver
        run: |
          version=$(grep -oP 'APP_VERSION = "\K[^"]+' backend/config.py)
          if [ -z "$version" ]; then
            echo "::error::Could not read APP_VERSION from backend/config.py"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "major_minor=$(echo "$version" | cut -d. -f1,2)" >> "$GITHUB_OUTPUT"

      - name: Skip if this release already exists
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.ver.outputs.tag }}"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "create=false" >> "$GITHUB_OUTPUT"
            echo "Release $tag already exists — nothing to do."
          else
            echo "create=true" >> "$GITHUB_OUTPUT"
            echo "Will cut release $tag."
          fi

      - name: Create the release (creating its tag on this commit)
        if: steps.gate.outputs.create == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TITLE: ${{ inputs.title }}
          NOTES: ${{ inputs.notes }}
        run: |
          tag="${{ steps.ver.outputs.tag }}"
          title="${TITLE:-$tag}"
          notes_file="docs/release-notes/$tag.md"
          if [ -n "$NOTES" ]; then
            printf '%s' "$NOTES" > "$RUNNER_TEMP/notes.md"
            gh release create "$tag" --repo "$GITHUB_REPOSITORY" --target "$GITHUB_SHA" \
              --title "$title" --notes-file "$RUNNER_TEMP/notes.md"
          elif [ -f "$notes_file" ]; then
            gh release create "$tag" --repo "$GITHUB_REPOSITORY" --target "$GITHUB_SHA" \
              --title "$title" --notes-file "$notes_file"
          else
            gh release create "$tag" --repo "$GITHUB_REPOSITORY" --target "$GITHUB_SHA" \
              --title "$title" --generate-notes
          fi

  image:
    needs: release
    if: needs.release.outputs.create == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # A tag created above with the built-in token does not re-trigger
      # build-and-publish.yml, so the semver-pinned images are built here.
      - name: Build and push semver-tagged images
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.release.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.release.outputs.major_minor }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
