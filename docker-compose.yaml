services:
  manager:
    # Tag comes from MANAGER_VERSION in .env: 'latest' follows every release,
    # or pin e.g. v0.31.0 to lock the manager to one version. Run
    # `docker compose pull` to update when following latest.
    image: ghcr.io/tubalainen/reforger-server-manager:${MANAGER_VERSION:-latest}
    # To build locally from source instead: comment 'image:', uncomment 'build:'
    # build: .
    container_name: reforger-manager
    restart: unless-stopped
    env_file: .env
    ports:
      # The web GUI. Server instances do NOT need port entries here: the
      # manager creates each Arma server as a *sibling* container on the host
      # Docker daemon and publishes its game/A2S/RCON UDP ports directly to
      # the host (0.0.0.0) via the Docker API. Open these ranges in your host
      # firewall so players can connect (defaults, configurable in .env):
      #   game  GAME_PORT_RANGE  2001-2020/udp
      #   A2S   A2S_PORT_RANGE   17777-17796/udp   (server browser query)
      #   RCON  RCON_PORT_RANGE  19999-20018/udp   (only if used remotely)
      - "${WEB_BIND:-127.0.0.1}:${WEB_PORT:-7780}:8080"
    volumes:
      # Manager state: SQLite DB, per-instance configs and profiles.
      # Ownership is fixed automatically by the container entrypoint.
      - ./data:/data
      # Root-equivalent on the host — required to spawn server containers.
      # Keep the GUI behind auth + firewall/reverse proxy.
      - /var/run/docker.sock:/var/run/docker.sock
      # Downloaded server files, one folder per branch: written by the
      # steamcmd download jobs, mounted into each server instance.
      # Kept as plain local folders so they are easy to inspect and back up.
      - ./serverfiles/stable:/serverfiles/stable:ro
      - ./serverfiles/experimental:/serverfiles/experimental:ro
    networks:
      - reforger-net

# Explicit name so the manager can attach sibling server containers
# without depending on the compose project name.
networks:
  reforger-net:
    name: reforger-net
