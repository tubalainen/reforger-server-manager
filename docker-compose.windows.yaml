# Reforger Server Manager — Windows 10/11 (Docker Desktop, WSL2 backend)
#
# Same stack as docker-compose.yaml, with one difference: state lives in Docker
# NAMED VOLUMES instead of folders next to this file. Server files are ~10 GB of
# Linux-owned files; keeping them on the Windows filesystem means slow 9p I/O and
# permission errors, while a named volume sits on the VM's native ext4 disk.
# Browse or back them up from Docker Desktop → Volumes.
#
# Start it with the desktop shortcut created by the installer, or by hand:
#   docker compose -f docker-compose.windows.yaml up -d
services:
  manager:
    image: ghcr.io/tubalainen/reforger-server-manager:latest
    container_name: reforger-manager
    restart: unless-stopped
    env_file: .env
    ports:
      # The web GUI. Server instances do NOT need port entries here: the
      # manager creates each Arma server as a *sibling* container on the host
      # Docker daemon and publishes its game/A2S/RCON UDP ports directly.
      # Docker Desktop forwards those published UDP ports onto the Windows
      # host, so players reach them once the WINDOWS firewall allows them
      # (defaults, configurable in .env):
      #   game  GAME_PORT_RANGE  2001-2020/udp
      #   A2S   A2S_PORT_RANGE   17777-17796/udp   (server browser query)
      #   RCON  RCON_PORT_RANGE  19999-20018/udp   (never expose to the internet)
      - "${WEB_BIND:-127.0.0.1}:${WEB_PORT:-7780}:8080"
    volumes:
      # Manager state: SQLite DB, per-instance configs and profiles.
      - reforger-data:/data
      # Root-equivalent on the host — required to spawn server containers.
      # Keep the GUI behind auth + firewall (never port-forward it).
      - /var/run/docker.sock:/var/run/docker.sock
      # Downloaded server files, one volume per branch: written by the steamcmd
      # download jobs, mounted read-only here and into each server instance.
      - reforger-serverfiles-stable:/serverfiles/stable:ro
      - reforger-serverfiles-experimental:/serverfiles/experimental:ro
    networks:
      - reforger-net

# Explicit names so the manager can attach sibling server containers and so the
# volumes survive a rename of the folder this file sits in.
networks:
  reforger-net:
    name: reforger-net

volumes:
  reforger-data:
    name: reforger-data
  reforger-serverfiles-stable:
    name: reforger-serverfiles-stable
  reforger-serverfiles-experimental:
    name: reforger-serverfiles-experimental
